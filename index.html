<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENT HORIZON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');
        
        :root {
            --glow-red: 0 0 20px rgba(255, 0, 0, 1), 0 0 40px rgba(255, 0, 0, 0.6);
            --glow-white: 0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #000; color: #fff; font-family: 'Fira+Code', monospace;
            overflow: hidden; margin: 0; height: 100vh; text-transform: uppercase;
        }

        .black-fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 105; pointer-events: none;
            background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.9) 100%);
        }

        .vhs-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px; opacity: 0.7;
        }

        #bg-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* REGULAR TUMBLING WORDS */
        .rain-word {
            position: absolute; color: #ffe6f2; font-size: 0.75rem; opacity: 0.35; 
            pointer-events: none; white-space: nowrap;
            animation: tumble-fall 1.3s linear forwards;
        }
        
        /* THE GLOWING WORDS - EXTREME VISIBILITY */
        .rare-drop {
            position: absolute; color: #fff; font-size: 1.5rem; font-weight: 900;
            text-shadow: var(--glow-white); cursor: pointer; z-index: 200;
            animation: tumble-fall-rare 8s linear forwards, 3d-spin 1.5s linear infinite;
        }

        /* --- UI TOP LEFT --- */
        .ui-top-left { 
            position: absolute; top: 40px; left: 40px; z-index: 110; 
            animation: path-a 5s ease-in-out infinite; 
        }
        #cmd-section { display: none; margin-top: 25px; animation: path-c-input 6s ease-in-out infinite; }
        #cmd-input {
            background: transparent; border: none; border-bottom: 2px solid #fff;
            color: #fff; font-family: 'Fira+Code', monospace; outline: none;
            width: 350px; font-size: 1.1rem; letter-spacing: 4px; padding-bottom: 8px;
        }

        /* --- UI BOTTOM RIGHT --- */
        .ui-bottom-right { position: absolute; bottom: 60px; right: 60px; z-index: 50; text-align: right; }
        .swap-box {
            position: relative; height: 7rem; width: 650px; display: flex; align-items: center; justify-content: flex-end;
            animation: path-b 8s ease-in-out infinite;
        }
        .timer-ui { display: flex; gap: 12px; align-items: baseline; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .sep { font-size: 3.5rem; opacity: 0.6; }
        .val { font-size: 5.5rem; letter-spacing: -3px; font-weight: 300; }
        .lab { font-size: 0.7rem; opacity: 0.5; letter-spacing: 5px; }
        
        #glitch-overlay { 
            display: none; position: absolute; right: 0; width: 100%; font-size: 5rem; 
            font-weight: 800; text-align: right; animation: glitch-shake 0.1s infinite;
        }

        .horizon-tag { 
            margin-top: 25px; color: #ff0000; font-size: 1.1rem; letter-spacing: 12px; 
            font-weight: 700; text-shadow: var(--glow-red); 
            animation: path-d 6s ease-in-out infinite;
        }

        /* --- ANIMATIONS --- */
        @keyframes tumble-fall { 
            0% { transform: translate(60vw, -15vh) rotate(0deg); opacity: 0; } 
            20% { opacity: 0.5; }
            100% { transform: translate(-60vw, 115vh) rotate(1080deg); opacity: 0; } 
        }

        @keyframes tumble-fall-rare { 
            0% { transform: translate(50vw, -20vh); opacity: 0; } 
            5% { opacity: 1; }
            100% { transform: translate(-50vw, 120vh); opacity: 0; } 
        }

        @keyframes 3d-spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes path-a { 0%, 100% { transform: translate(0,0) rotate(0.2deg); } 50% { transform: translate(10px, -6px) rotate(-0.5deg); } }
        @keyframes path-b { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px, -10px) scale(1.05); } }
        @keyframes path-c-input { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(12px, 4px); } }
        @keyframes path-d { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-40px); } }
        @keyframes glitch-shake { 0% { transform: translate(-6px, 6px); } 50% { transform: translate(6px, -6px); } }

    </style>
</head>
<body>

    <div class="vhs-overlay"></div>
    <div class="black-fog"></div>
    <div id="bg-wrap"></div>

    <div class="ui-top-left">
        <div class="source-data">
            [ STATUS: DEPLETING_REALITY ]<br>
            [ PROTOCOL: EVENT_HORIZON ]
        </div>
        <div id="cmd-section">
            <span>></span> <input type="text" id="cmd-input" placeholder="AWAITING_INPUT..." autocomplete="off">
        </div>
    </div>

    <div class="ui-bottom-right">
        <div class="swap-box">
            <div class="timer-ui" id="timer-display">
                <div class="unit"><span class="val" id="d">000</span><span class="lab">DAYS</span></div>
                <div class="sep">:</div>
                <div class="unit"><span class="val" id="h">00</span><span class="lab">HRS</span></div>
                <div class="sep">:</div>
                <div class="unit"><span class="val" id="m">00</span><span class="lab">MIN</span></div>
                <div class="sep">:</div>
                <div class="unit"><span class="val" id="s">00</span><span class="lab">SEC</span></div>
            </div>
            <div id="glitch-overlay"></div>
        </div>
        <div class="horizon-tag">CRITICAL_EVENT_HORIZON: 27.06.2026</div>
    </div>

    <script>
        const targetDate = new Date("2026-06-27T00:00:00Z").getTime();
        const rainWords = ["when", "where", "what", "why", "and", "key", "no", "yes", "go"];
        const rareWords = ["HARMONY", "PERFECTION", "SKY", "THE_END"];
        const redPool = ["ITS TICKING!", "FOOLISH!", "SUMMER!!", "BORING."];
        const greenPool = ["the children..", "prophecy is a lie..", "save them!"];
        
        const bg = document.getElementById('bg-wrap');
        const cmdInput = document.getElementById('cmd-input');
        let rareActive = true; 

        // Spawn regular storm fast
        function spawnRain() {
            const w = document.createElement('div');
            w.className = 'rain-word';
            w.innerText = rainWords[Math.floor(Math.random() * rainWords.length)];
            w.style.left = (Math.random() * 150 - 25) + 'vw';
            w.style.top = '-10vh';
            bg.appendChild(w);
            setTimeout(() => { if(w.parentNode) w.remove(); }, 1400);
        }

        // Spawn rare glowing word
        function spawnRare() {
            if (!rareActive) return;
            const w = document.createElement('div');
            w.className = 'rare-drop';
            w.innerText = rareWords[Math.floor(Math.random() * rareWords.length)];
            w.style.left = (Math.random() * 80 + 10) + 'vw'; // Center-ish spawn
            w.style.top = '-15vh';
            
            w.onclick = function() {
                rareActive = false; 
                document.getElementById('cmd-section').style.display = 'block';
                cmdInput.focus();
                this.remove(); 
            };
            
            bg.appendChild(w);
            setTimeout(() => { if(w.parentNode) w.remove(); }, 8500);
        }

        function update() {
            const diff = targetDate - new Date().getTime();
            if (diff <= 0) return;
            document.getElementById('d').innerText = String(Math.floor(diff / 86400000)).padStart(3, '0');
            document.getElementById('h').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('m').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('s').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }

        function triggerGlitch() {
            const timer = document.getElementById('timer-display');
            const glitch = document.getElementById('glitch-overlay');
            const roll = Math.random() * 100;
            if (roll <= 27) {
                glitch.innerText = greenPool[Math.floor(Math.random() * greenPool.length)];
                glitch.style.color = "#44ff44";
            } else {
                glitch.innerText = redPool[Math.floor(Math.random() * redPool.length)];
                glitch.style.color = "#ff3333";
            }
            timer.style.visibility = 'hidden';
            glitch.style.display = 'block';
            setTimeout(() => { glitch.style.display = 'none'; timer.style.visibility = 'visible'; }, 220);
        }

        setInterval(update, 1000);
        setInterval(triggerGlitch, 2700);
        setInterval(spawnRain, 40); 
        
        // Spawn one immediately, then every 10s
        spawnRare();
        setInterval(spawnRare, 10000); 

        update();
    </script>
</body>
</html>
